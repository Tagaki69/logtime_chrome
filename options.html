<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Options - 42 Logtime</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Configuration 42 Logtime</h1>
    
    <div class="section">
      <h2>🔑 Identification API 42</h2>
      <p class="desc">Tu dois créer une application OAuth sur l'Intra 42 pour obtenir ces clés (Scopes: public).</p>
      <div class="input-group">
        <label for="username">Ton Login</label>
        <input type="text" id="username" placeholder="ex: papilaz">
      </div>
      <div class="input-group">
        <label for="uid">API UID</label>
        <input type="text" id="uid" placeholder="u-s4t2ud...">
      </div>
      <div class="input-group">
        <label for="secret">API Secret</label>
        <input type="password" id="secret" placeholder="s-s4t2ud...">
      </div>
    </div>

    <div class="section">
      <h2>⏱️ Configuration Logtime</h2>
      <div class="input-group">
        <label for="giftDays">Jours Offerts (Gift Days) <br><small>1 jour = -7h sur l'objectif</small></label>
        <input type="number" id="giftDays" min="0" max="31" value="0">
      </div>
    </div>

    <div class="section">
      <h2>📅 Mon Planning Type</h2>
      <p class="desc">Coche les jours où tu prévois de travailler pour calculer ton objectif quotidien.</p>
      <div class="days-grid" id="planningDays">
        <!-- JS va remplir ça -->
      </div>
    </div>

    <div class="section">
      <h2>👥 Gestion des Amis</h2>
      <div class="input-group row">
        <input type="text" id="newFriend" placeholder="ex: norminet">
        <button id="addFriendBtn">Ajouter</button>
      </div>
      <ul id="friendsList" class="friends-list">
        <!-- JS va remplir ça -->
      </ul>
    </div>


    <div class="actions">
      <button id="saveBtn" class="primary">Sauvegarder les paramètres</button>
      <span id="statusMessage" class="status-msg"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
