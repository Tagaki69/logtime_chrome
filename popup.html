<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="main-time" id="mainTime">...</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
    </div>
    <div class="time-details">
      <span id="ratioTime">0h / 0h</span>
      <span class="warning-text" id="targetDaily">Cible/J: -</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><span class="label">Aujourd'hui</span><span class="value" id="todayLogtime">-</span></div>
    <div class="stat-box"><span class="label">Wallet</span><span class="value" id="wallet">-</span></div>
    <div class="stat-box"><span class="label">Eval</span><span class="value" id="evalPoints">-</span></div>
  </div>

  <div class="section-title">PROCHAINES DÉFENSES</div>
  <div class="defenses-list" id="defensesBox">
    <div class="loading">Chargement...</div>
  </div>

  <div class="section-title flex-between">
    <span id="friendsTitle">FRIENDS STATUS</span>
    <div class="actions">
      <button id="btnMatrix" title="Matrix">🟢</button>
      <button id="btnCalendar" title="Mon Calendrier">📅</button>
      <button id="btnFriends" title="Amis" style="display:none;">👥</button>
      <button id="btnProfile" title="Mon Profil">👤</button>
      <button id="btnRefresh" title="Rafraîchir">🔄</button>
      <button id="btnSettings" title="Paramètres">⚙️</button>
    </div>
  </div>

  <div id="friendsView" class="view-panel">
    <div class="friends-list" id="friendsBox">
      <div class="loading">Chargement...</div>
    </div>
  </div>

  <div id="calendarView" class="view-panel" style="display:none;">
    <div class="calendar-grid" id="calendarGrid">
      <!-- Generated by JS -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
